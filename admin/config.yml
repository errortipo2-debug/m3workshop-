backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "images"

locale: "es"

collections:
  - name: "contenido"
    label: "Web"
    files:
      - name: "obras"
        label: "Obras y tienda"
        file: "content/works.json"
        description: "Añade, edita o borra tus cuadros y los productos de la tienda."
        fields:
          - label: "Obras (catálogo)"
            name: "works"
            widget: "list"
            label_singular: "Obra"
            summary: "{{fields.title}} — {{fields.year}}"
            fields:
              - { label: "Título", name: "title", widget: "string" }
              - { label: "Foto del cuadro", name: "image", widget: "image", required: false, hint: "Si lo dejas vacío se muestra un fondo de color." }
              - { label: "Técnica", name: "medium", widget: "string", required: false, hint: "Ej: Oxide & acrylic / canvas" }
              - { label: "Medidas", name: "size", widget: "string", required: false, hint: "Ej: 140×100" }
              - { label: "Año", name: "year", widget: "string", required: false }
              - { label: "Precio", name: "price", widget: "string", required: false, hint: "Ej: € 1.450" }
              - { label: "Vendido", name: "sold", widget: "boolean", default: false, hint: "Si lo activas, aparece el sello Collected." }

          - label: "Tienda"
            name: "shop"
            widget: "list"
            label_singular: "Producto"
            summary: "{{fields.title}} — {{fields.price}}"
            fields:
              - { label: "Título", name: "title", widget: "string" }
              - { label: "Foto", name: "image", widget: "image", required: false }
              - { label: "Descripción corta", name: "meta", widget: "string", required: false, hint: "Ej: Original · 80×80 · framed" }
              - { label: "Precio", name: "price", widget: "string", required: false }
              - { label: "Enlace de pago", name: "link", widget: "string", required: false, hint: "Pega aquí el link de Mollie/Stripe. Si lo dejas vacío, el botón abre un email." }
